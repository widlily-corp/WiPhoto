name: Build Windows Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pillow-heif
          pip install nuitka ordered-set zstandard

      - name: Download ExifTool
        shell: bash
        run: |
          curl -L -o exiftool.zip "https://sourceforge.net/projects/exiftool/files/exiftool-13.52_64.zip/download"
          unzip -o exiftool.zip -d /tmp/exiftool_extract/
          # Zip structure: exiftool-13.52_64/exiftool_files/ (perl+libs) + exiftool-13.52_64/exiftool(-k).exe
          mv /tmp/exiftool_extract/exiftool-13.52_64/exiftool_files ./exiftool_files
          # The exe is at top level of the extracted dir, not inside exiftool_files
          cp /tmp/exiftool_extract/exiftool-13.52_64/exiftool*.exe ./exiftool_files/exiftool.exe
          rm -rf exiftool.zip /tmp/exiftool_extract
          ls -la exiftool_files/exiftool.exe

      - name: Install dependency walker for Nuitka
        shell: bash
        run: |
          python -m nuitka --help >/dev/null 2>&1 || true
          # Nuitka needs dependency walker on Windows standalone
          pip install ordered-set
          python -c "
          import urllib.request, zipfile, os, sys
          url = 'https://dependencywalker.com/depends22_x64.zip'
          dest = os.path.join(os.path.dirname(sys.executable), 'depends.exe')
          if not os.path.exists(dest):
              urllib.request.urlretrieve(url, 'depends.zip')
              with zipfile.ZipFile('depends.zip') as z:
                  z.extractall(os.path.dirname(sys.executable))
              os.remove('depends.zip')
              print('Dependency Walker installed')
          else:
              print('Dependency Walker already present')
          "

      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyqt6 `
            --include-data-dir=assets=assets `
            --include-data-dir=exiftool_files=exiftool_files `
            --include-data-file=liquid_glass.qss=liquid_glass.qss `
            --include-package=cv2 `
            --include-package=PIL `
            --include-package=numpy `
            --include-package=rawpy `
            --include-package=imagehash `
            --include-package=skimage `
            --include-package=pillow_heif `
            --include-package-data=cv2 `
            --nofollow-import-to=matplotlib `
            --nofollow-import-to=scipy `
            --nofollow-import-to=tkinter `
            --nofollow-import-to=torch `
            --nofollow-import-to=torchvision `
            --nofollow-import-to=simple_lama_inpainting `
            --windows-icon-from-ico=assets/icon.ico `
            --windows-console-mode=disable `
            --output-dir=build `
            main.py

      - name: Package distribution
        shell: pwsh
        run: |
          $distDir = "dist/WiPhoto_v2.0.0_Windows"
          New-Item -ItemType Directory -Force -Path $distDir

          # Copy build output
          Copy-Item -Recurse "build/main.dist/*" $distDir/

          # Rename executable
          Rename-Item "$distDir/main.exe" "WiPhoto.exe"

          # Create archive
          Compress-Archive -Path $distDir -DestinationPath "dist/WiPhoto_v2.0.0_Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiPhoto_v2.0.0_Windows
          path: dist/WiPhoto_v2.0.0_Windows.zip

      - name: Upload to release (on release event)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} dist/WiPhoto_v2.0.0_Windows.zip --clobber

      - name: Upload to latest release (on manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v2.0.0 dist/WiPhoto_v2.0.0_Windows.zip --clobber
