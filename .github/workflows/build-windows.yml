name: Build Windows Release

on:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r requirements.txt
          pip install pillow-heif
          pip install nuitka ordered-set zstandard

      - name: Download ExifTool
        shell: pwsh
        run: |
          $exiftoolUrl = "https://sourceforge.net/projects/exiftool/files/exiftool-13.52_64.zip/download"
          $zipPath = "exiftool.zip"
          Invoke-WebRequest -Uri $exiftoolUrl -OutFile $zipPath -UserAgent "Mozilla/5.0"
          New-Item -ItemType Directory -Force -Path "exiftool_files"
          Expand-Archive -Path $zipPath -DestinationPath "exiftool_files" -Force
          # Rename exiftool(-k).exe to exiftool.exe
          Get-ChildItem "exiftool_files" -Filter "exiftool*.exe" | ForEach-Object {
            if ($_.Name -ne "exiftool.exe") {
              Rename-Item $_.FullName "exiftool.exe"
            }
          }
          Remove-Item $zipPath

      - name: Build with Nuitka
        run: |
          python -m nuitka `
            --standalone `
            --enable-plugin=pyqt6 `
            --include-data-dir=assets=assets `
            --include-data-dir=exiftool_files=exiftool_files `
            --include-data-file=liquid_glass.qss=liquid_glass.qss `
            --include-package=cv2 `
            --include-package=PIL `
            --include-package=numpy `
            --include-package=rawpy `
            --include-package=imagehash `
            --include-package=skimage `
            --include-package=pillow_heif `
            --include-package-data=cv2 `
            --nofollow-import-to=matplotlib `
            --nofollow-import-to=scipy `
            --nofollow-import-to=tkinter `
            --nofollow-import-to=torch `
            --nofollow-import-to=torchvision `
            --nofollow-import-to=simple_lama_inpainting `
            --windows-icon-from-ico=assets/icon.ico `
            --windows-console-mode=disable `
            --output-dir=build `
            main.py

      - name: Package distribution
        shell: pwsh
        run: |
          $distDir = "dist/WiPhoto_v2.0.0_Windows"
          New-Item -ItemType Directory -Force -Path $distDir

          # Copy build output
          Copy-Item -Recurse "build/main.dist/*" $distDir/

          # Rename executable
          Rename-Item "$distDir/main.exe" "WiPhoto.exe"

          # Create archive
          Compress-Archive -Path $distDir -DestinationPath "dist/WiPhoto_v2.0.0_Windows.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: WiPhoto_v2.0.0_Windows
          path: dist/WiPhoto_v2.0.0_Windows.zip

      - name: Upload to release (on release event)
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ github.event.release.tag_name }} dist/WiPhoto_v2.0.0_Windows.zip --clobber

      - name: Upload to latest release (on manual trigger)
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload v2.0.0 dist/WiPhoto_v2.0.0_Windows.zip --clobber
